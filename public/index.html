<!-- public/index.html -->
<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="icon" href="/favicon.png" type="image/png" sizes="32x32" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="manifest" href="/site.webmanifest" />
  <meta name="theme-color" content="#2563EB" />
  <title>MaMage 图库</title>
</head>

<body>
  <!-- Inject COS base for asset URLs; HtmlWebpackPlugin will replace the template value -->
  <script>
    (function () {
      var cosBase = '<%= MAMAGE_COS_BASE %>' || '';
      var apiBase = '<%= MAMAGE_API_BASE %>' || '';
      var uploadApiBase = '<%= MAMAGE_UPLOAD_API_BASE %>' || '';
      var uploadLanBases = '<%= MAMAGE_UPLOAD_LAN_BASES %>' || '';
      var disableDirectUpload = '<%= MAMAGE_DISABLE_DIRECT_UPLOAD %>' || '';
      if (cosBase) {
        try { window.__MAMAGE_COS_BASE__ = cosBase.replace(/\/+$/, ''); } catch (e) { }
      }
      if (apiBase) {
        try { window.__MAMAGE_API_BASE__ = apiBase.replace(/\/+$/, ''); } catch (e) { }
      }
      if (uploadApiBase) {
        try { window.__MAMAGE_UPLOAD_API_BASE__ = uploadApiBase.replace(/\/+$/, ''); } catch (e) { }
      }
      if (uploadLanBases) {
        try { window.__MAMAGE_UPLOAD_LAN_BASES__ = uploadLanBases; } catch (e) { }
      }
      try {
        window.__MAMAGE_UPLOAD_SELECTED_BASE__ = window.__MAMAGE_UPLOAD_SELECTED_BASE__ || '';
        window.__MAMAGE_UPLOAD_SELECTED_BASE_SOURCE__ = window.__MAMAGE_UPLOAD_SELECTED_BASE_SOURCE__ || 'boot';
        window.__MAMAGE_UPLOAD_CANDIDATE_BASES__ = uploadLanBases
          ? uploadLanBases.split(',').map(function (item) { return item.trim(); }).filter(Boolean)
          : [
              'https://10.11.12.63:3443',
              'https://lan.mamage.wenyuli.site:3443',
              'https://lan.mamage.wenyuli.site',
              'http://10.11.12.63:3000',
              'http://10.100.83.67:3000'
            ];
      } catch (e) { }
      if (disableDirectUpload) {
        try {
          window.__MAMAGE_DISABLE_DIRECT_UPLOAD__ = /^(1|true|yes)$/i.test(disableDirectUpload);
        } catch (e) { }
      }
    })();
  </script>
  <div id="root"></div>
</body>

</html>
