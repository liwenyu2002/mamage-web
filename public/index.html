<!-- public/index.html -->
<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="icon" href="/favicon.png" type="image/png" sizes="32x32" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="manifest" href="/site.webmanifest" />
  <meta name="theme-color" content="#2563EB" />
  <title>MaMage 图库（Semi 主题版）</title>
</head>

<body>
  <!-- Inject COS base for asset URLs; HtmlWebpackPlugin will replace the template value -->
  <script>
    (function () {
      var cosBase = '<%= MAMAGE_COS_BASE %>' || '';
      var apiBase = '<%= MAMAGE_API_BASE %>' || '';
      if (cosBase) {
        try { window.__MAMAGE_COS_BASE__ = cosBase.replace(/\/+$/, ''); } catch (e) { }
      }
      if (apiBase) {
        try { window.__MAMAGE_API_BASE__ = apiBase.replace(/\/+$/, ''); } catch (e) { }
      }
    })();
  </script>
  <div id="root"></div>
</body>

</html>
