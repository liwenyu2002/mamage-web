name: Deploy mamage-web (frontend, self-hosted)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: self-hosted
    env:
      GIT_TERMINAL_PROMPT: "0"
      GCM_INTERACTIVE: "Never"
      GIT_ASKPASS: /bin/echo
    defaults:
      run:
        shell: bash

    steps:
      - name: Network precheck
        timeout-minutes: 2
        run: |
          set -euo pipefail
          echo "Checking github endpoints..."
          timeout --foreground 20s curl -I https://github.com >/dev/null
          timeout --foreground 20s curl -I https://api.github.com >/dev/null
          timeout --foreground 20s curl -I https://codeload.github.com >/dev/null
          timeout --foreground 20s git ls-remote --heads https://github.com/liwenyu2002/mamage-web.git >/dev/null

      - name: Download source archive
        timeout-minutes: 3
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          SRC_DIR="${RUNNER_TEMP}/mamage-web-src"
          ARCHIVE="${RUNNER_TEMP}/mamage-web-src.tar.gz"
          URL_FAST="https://codeload.github.com/${GITHUB_REPOSITORY}/tar.gz/${GITHUB_SHA}"
          URL_PROXY="https://ghproxy.com/${URL_FAST}"
          URL_API="https://api.github.com/repos/${GITHUB_REPOSITORY}/tarball/${GITHUB_SHA}"
          rm -rf "${SRC_DIR}" "${ARCHIVE}"
          mkdir -p "${SRC_DIR}"

          echo "Downloading source archive from codeload..."
          if timeout --foreground 40s curl -fsSL --retry 1 --retry-delay 2 -o "${ARCHIVE}" "${URL_FAST}"; then
            echo "Downloaded via codeload."
          else
            echo "codeload failed, trying ghproxy..."
            if timeout --foreground 40s curl -fsSL --retry 1 --retry-delay 2 -o "${ARCHIVE}" "${URL_PROXY}"; then
              echo "Downloaded via ghproxy."
            else
              echo "ghproxy failed, fallback to GitHub API tarball..."
              timeout --foreground 40s curl -fsSL \
                -H "Authorization: Bearer ${GH_TOKEN}" \
                -H "Accept: application/vnd.github+json" \
                --retry 1 --retry-delay 2 \
                -o "${ARCHIVE}" "${URL_API}"
            fi
          fi
          tar -xzf "${ARCHIVE}" -C "${SRC_DIR}" --strip-components=1
          rsync -a --delete "${SRC_DIR}/" "${GITHUB_WORKSPACE}/"

      - name: Sync workspace to deploy directory
        run: |
          set -euo pipefail
          DEPLOY_DIR="/home/liwy/MaMage_Web"
          mkdir -p "${DEPLOY_DIR}"
          rsync -a --delete \
            --exclude ".git/" \
            --exclude ".github/" \
            "${GITHUB_WORKSPACE}/" "${DEPLOY_DIR}/"

      - name: Verify local Node.js
        run: |
          set -euo pipefail
          node -v
          npm -v

      - name: Install dependencies
        run: |
          set -euo pipefail
          cd /home/liwy/MaMage_Web
          npm ci || npm install

      - name: Build frontend
        run: |
          set -euo pipefail
          cd /home/liwy/MaMage_Web
          npm run build

      - name: Verify build output
        run: |
          set -euo pipefail
          test -d /home/liwy/MaMage_Web/dist
          test -f /home/liwy/MaMage_Web/dist/index.html

      - name: Reload nginx if passwordless sudo is available
        run: |
          if sudo -n true 2>/dev/null; then
            sudo -n nginx -t
            sudo -n systemctl reload nginx
            echo "Nginx validated and reloaded."
          else
            echo "Skip nginx reload: passwordless sudo is not configured for this runner user."
          fi
