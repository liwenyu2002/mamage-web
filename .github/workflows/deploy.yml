name: Deploy mamage-web (frontend)

on:
  push:
    branches: ["main"]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Use Node.js 20
        uses: actions/setup-node@v5
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci || npm install

      - name: Build frontend
        run: npm run build

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Validate deploy config
        run: |
          set -euo pipefail
          if [ -z "${DEPLOY_HOST:-}" ]; then
            echo "DEPLOY_HOST is empty"
            exit 1
          fi
          if [ -z "${DEPLOY_USER:-}" ]; then
            echo "DEPLOY_USER is empty"
            exit 1
          fi
          if [ -z "${DEPLOY_PORT:-}" ]; then
            echo "DEPLOY_PORT is empty, fallback to 22"
          fi

      - name: Test SSH connectivity
        run: |
          set -euo pipefail
          PORT="${DEPLOY_PORT:-22}"
          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=8 -p "${PORT}" \
            "${DEPLOY_USER}@${DEPLOY_HOST}" "echo connected && whoami"

      - name: Prepare target directory on server
        run: |
          set -euo pipefail
          PORT="${DEPLOY_PORT:-22}"
          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=8 -p "${PORT}" \
            "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "mkdir -p /home/liwy/MaMage_Web/dist"

      - name: Upload dist/ to server via rsync
        run: |
          set -euo pipefail
          PORT="${DEPLOY_PORT:-22}"
          rsync -az --delete \
            -e "ssh -p ${PORT} -o StrictHostKeyChecking=no -o ConnectTimeout=8" \
            dist/ \
            "${DEPLOY_USER}@${DEPLOY_HOST}:/home/liwy/MaMage_Web/dist/"

      - name: Reload nginx if passwordless sudo is available
        run: |
          set -euo pipefail
          PORT="${DEPLOY_PORT:-22}"
          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=8 -p "${PORT}" \
            "${DEPLOY_USER}@${DEPLOY_HOST}" <<'EOF'
          if sudo -n true 2>/dev/null; then
            sudo -n nginx -t
            sudo -n systemctl reload nginx
            echo "Nginx validated and reloaded."
          else
            echo "Skip nginx reload: passwordless sudo is not configured for this deploy user."
          fi
          EOF
