name: Deploy mamage-web (frontend, self-hosted)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: self-hosted
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Sync workspace to deploy directory
        run: |
          set -euo pipefail
          DEPLOY_DIR="/home/liwy/MaMage_Web"
          mkdir -p "${DEPLOY_DIR}"
          rsync -a --delete \
            --exclude ".git/" \
            --exclude ".github/" \
            "${GITHUB_WORKSPACE}/" "${DEPLOY_DIR}/"

      - name: Use Node.js 20
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: |
          set -euo pipefail
          cd /home/liwy/MaMage_Web
          npm ci || npm install

      - name: Build frontend
        run: |
          set -euo pipefail
          cd /home/liwy/MaMage_Web
          npm run build

      - name: Verify build output
        run: |
          set -euo pipefail
          test -d /home/liwy/MaMage_Web/dist
          test -f /home/liwy/MaMage_Web/dist/index.html

      - name: Reload nginx if passwordless sudo is available
        run: |
          if sudo -n true 2>/dev/null; then
            sudo -n nginx -t
            sudo -n systemctl reload nginx
            echo "Nginx validated and reloaded."
          else
            echo "Skip nginx reload: passwordless sudo is not configured for this runner user."
          fi
