name: Deploy mamage-web (frontend, self-hosted)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: self-hosted
    env:
      GIT_TERMINAL_PROMPT: "0"
      GCM_INTERACTIVE: "Never"
      GIT_ASKPASS: /bin/echo
    defaults:
      run:
        shell: bash

    steps:
      - name: Network precheck (non-blocking)
        timeout-minutes: 2
        run: |
          set -u
          echo "Checking mirror and github endpoints..."
          if ! timeout --foreground 20s curl -I https://gitee.com >/dev/null; then
            echo "WARN: gitee.com precheck failed (will continue)."
          fi
          if ! timeout --foreground 20s git ls-remote --heads https://gitee.com/liwenyu2002/mamage-web.git >/dev/null; then
            echo "WARN: gitee repo precheck failed (will continue)."
          fi
          if ! timeout --foreground 20s curl -I https://github.com >/dev/null; then
            echo "WARN: github.com precheck failed (will continue)."
          fi

      - name: Wait for current commit mirrored to Gitee
        continue-on-error: true
        timeout-minutes: 5
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          set -euo pipefail
          TARGET_SHA="${GITHUB_SHA}"
          if [ -n "${GITEE_TOKEN:-}" ]; then
            GITEE_URL="https://${GITEE_TOKEN}@gitee.com/liwenyu2002/mamage-web.git"
          else
            GITEE_URL="https://gitee.com/liwenyu2002/mamage-web.git"
          fi

          echo "Waiting for gitee main to reach ${TARGET_SHA} ..."
          deadline=$((SECONDS + 240))
          while true; do
            REMOTE_SHA="$(timeout --foreground 20s git ls-remote --heads "${GITEE_URL}" main | awk '{print $1}' | tr -d '\r' || true)"
            if [ -n "${REMOTE_SHA}" ]; then
              echo "Current gitee/main: ${REMOTE_SHA}"
              if [ "${REMOTE_SHA}" = "${TARGET_SHA}" ]; then
                echo "Gitee mirror is up-to-date for this deployment."
                break
              fi
            fi

            if [ "${SECONDS}" -ge "${deadline}" ]; then
              echo "Timed out waiting for gitee mirror. expected=${TARGET_SHA}, current=${REMOTE_SHA:-unknown}"
              exit 1
            fi
            sleep 5
          done

      - name: Fetch source (gitee first, github fallback)
        timeout-minutes: 3
        env:
          GH_TOKEN: ${{ github.token }}
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          set -euo pipefail
          SRC_DIR="${RUNNER_TEMP}/mamage-web-src"
          ARCHIVE="${RUNNER_TEMP}/mamage-web-src.tgz"
          URL_API="https://api.github.com/repos/${GITHUB_REPOSITORY}/tarball/${GITHUB_SHA}"
          rm -rf "${SRC_DIR}" "${ARCHIVE}"
          mkdir -p "${SRC_DIR}"

          if [ -n "${GITEE_TOKEN:-}" ]; then
            GITEE_URL="https://${GITEE_TOKEN}@gitee.com/liwenyu2002/mamage-web.git"
          else
            GITEE_URL="https://gitee.com/liwenyu2002/mamage-web.git"
          fi

          echo "Cloning from gitee mirror..."
          if timeout --foreground 60s git clone --depth=1 -b main "${GITEE_URL}" "${SRC_DIR}"; then
            echo "Fetched source from gitee."
            rsync -a --delete --exclude ".git/" "${SRC_DIR}/" "${GITHUB_WORKSPACE}/"
          else
            echo "Gitee clone failed, fallback to GitHub API tarball..."
            timeout --foreground 45s curl -fsSL \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              --retry 1 --retry-delay 2 \
              -o "${ARCHIVE}" "${URL_API}"
            rm -rf "${SRC_DIR}"
            mkdir -p "${SRC_DIR}"
            tar -xzf "${ARCHIVE}" -C "${SRC_DIR}" --strip-components=1
            rsync -a --delete "${SRC_DIR}/" "${GITHUB_WORKSPACE}/"
          fi

      - name: Sync workspace to deploy directory
        run: |
          set -euo pipefail
          DEPLOY_DIR="/home/liwy/MaMage_Web"
          mkdir -p "${DEPLOY_DIR}"
          rsync -a --delete \
            --exclude ".git/" \
            --exclude ".github/" \
            "${GITHUB_WORKSPACE}/" "${DEPLOY_DIR}/"

      - name: Verify local Node.js
        run: |
          set -euo pipefail
          node -v
          npm -v

      - name: Install dependencies
        run: |
          set -euo pipefail
          cd /home/liwy/MaMage_Web
          echo "Node: $(node -v)"
          echo "NPM:  $(npm -v)"
          npm config set registry https://registry.npmmirror.com
          npm config set fetch-retries 2
          npm config set fetch-retry-factor 2
          npm config set fetch-retry-mintimeout 5000
          npm config set fetch-retry-maxtimeout 20000
          npm config set progress true
          npm config set fund false
          npm config set audit false
          npm ping

          echo "Installing with npm ci (timeout 8m)..."
          if ! timeout --foreground 8m npm ci --prefer-online --no-audit --no-fund --loglevel=verbose; then
            echo "npm ci failed, fallback to npm install (timeout 8m)..."
            timeout --foreground 8m npm install --prefer-online --no-audit --no-fund --loglevel=verbose
          fi

      - name: Build frontend
        run: |
          set -euo pipefail
          cd /home/liwy/MaMage_Web
          npm run build

      - name: Verify build output
        run: |
          set -euo pipefail
          test -d /home/liwy/MaMage_Web/dist
          test -f /home/liwy/MaMage_Web/dist/index.html

      - name: Reload nginx if passwordless sudo is available
        run: |
          if sudo -n true 2>/dev/null; then
            sudo -n nginx -t
            sudo -n systemctl reload nginx
            echo "Nginx validated and reloaded."
          else
            echo "Skip nginx reload: passwordless sudo is not configured for this runner user."
          fi
