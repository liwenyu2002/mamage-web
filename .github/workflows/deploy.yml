name: Deploy mamage-web (frontend, self-hosted)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Use Node.js 20
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci || npm install

      - name: Build frontend
        run: npm run build

      - name: Prepare target directory
        run: mkdir -p /home/liwy/MaMage_Web/dist

      - name: Sync dist to target
        run: rsync -az --delete dist/ /home/liwy/MaMage_Web/dist/

      - name: Reload nginx if passwordless sudo is available
        run: |
          if sudo -n true 2>/dev/null; then
            sudo -n nginx -t
            sudo -n systemctl reload nginx
            echo "Nginx validated and reloaded."
          else
            echo "Skip nginx reload: passwordless sudo is not configured for this runner user."
          fi
